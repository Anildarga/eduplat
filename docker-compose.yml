version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eduplat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduplat
      POSTGRES_PASSWORD: eduplat123
      POSTGRES_DB: eduplat
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduplat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
